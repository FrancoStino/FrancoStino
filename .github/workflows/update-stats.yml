name: GitHub Readme CI

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, 'Auto-update: GitHub Stats')

    outputs:
      pr_number: ${{ steps.create-pr.outputs.pr_number }}
      issue_number: ${{ steps.create-issue.outputs.issue_number }}

    env:
      GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}

    steps:
      - name: 0. Checkout Main Branch
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.WORKFLOW_TOKEN }}
          fetch-depth: 0

      - name: 0b. Configure Git
        run: |
          git config --local user.email "info@davideladisa.it"
          git config --local user.name "FrancoStino"

      - name: 1. Create Issue
        id: create-issue
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: |
          retry_command() {
            local max_attempts=5
            local timeout=30
            local attempt=1
            local exitCode=0
            while (( attempt <= max_attempts )); do
              echo "Attempt $attempt of $max_attempts..." >&2
              if timeout $timeout "$@"; then
                return 0
              else
                exitCode=$?
                if (( attempt < max_attempts )); then
                  echo "Command failed, waiting 10 seconds before retry..." >&2
                  sleep 10
                fi
              fi
              ((attempt++))
            done
            return $exitCode
          }

          ISSUE_BODY="🤖 Aggiornamento automatico delle statistiche GitHub

          Questo aggiornamento include:
          - 🏆 GitHub trophies
          - 📊 GitHub stats
          - ⌨️ Top languages
          - 🔥 GitHub streak

          ---
          *Issue creata automaticamente dal workflow*"

          echo "Creating new issue..."
          ISSUE_URL=$(retry_command gh issue create \
            --title "🔄 Update GitHub Stats & Visualizations" \
            --body "$ISSUE_BODY" \
            --assignee "FrancoStino")
          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oP '\d+$')
          echo "Issue created: #$ISSUE_NUMBER"

          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"

      - name: 2. Create before-pull branch if not exists
        run: |
          git fetch origin
          if ! git rev-parse --verify origin/before-pull >/dev/null 2>&1; then
            git checkout -b before-pull
            git push origin before-pull
          fi
          git checkout before-pull
          git pull origin before-pull
          git merge origin/main --no-edit || true

      - name: 3. Create assets directory if not exists
        run: |
          if [ ! -d "assets" ]; then
            mkdir -p assets
            echo "# Assets Directory" > assets/README.md
            echo "This directory contains auto-generated GitHub stats and visualizations." >> assets/README.md
          fi

      - name: 4. Generate GitHub Trophies
        id: trophies-card
        continue-on-error: true
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: ${{ github.repository_owner }}
          output_path: assets/github-trophies.svg
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: 4b. Warn if trophies failed
        if: steps.trophies-card.outcome == 'failure'
        run: echo "⚠️ Generazione trophies fallita, asset precedente non aggiornato."

      - name: 5. Generate GitHub Stats card
        id: stats-card
        continue-on-error: true
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&include_all_commits=true&theme=tokyonight&show=reviews,prs_merged&count_private=true
          path: assets/github-stats.svg
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: 5b. Warn if stats card failed
        if: steps.stats-card.outcome == 'failure'
        run: echo "⚠️ Generazione stats card fallita, asset precedente non aggiornato."

      - name: 6. Generate Top Languages card
        id: top-langs-card
        continue-on-error: true
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&langs_count=10&layout=compact&theme=tokyonight&hide_border=false&include_all_commits=true&count_private=true
          path: assets/top-languages.svg
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: 6b. Warn if top languages card failed
        if: steps.top-langs-card.outcome == 'failure'
        run: echo "⚠️ Generazione top languages card fallita, asset precedente non aggiornato."

      - name: 7. Generate GitHub Streak card
        id: streak-card
        continue-on-error: true
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&theme=tokyonight&hide_border=false
          path: assets/github-streak.svg
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: 7b. Warn if streak card failed
        if: steps.streak-card.outcome == 'failure'
        run: echo "⚠️ Generazione streak card fallita, asset precedente non aggiornato."

      - name: 8. Fetch GitHub Contribution Card
        id: contribution-card
        continue-on-error: true
        uses: FrancoStino/github-contribution-card/action@main
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        with:
          username: FrancoStino
          output-file: assets/github-contribution-card.svg
          combine-all-yearly-contributions: 'false'
          hide-contributor-rank: 'false'
          theme: 'tokyonight'
          hide: 'B'

      - name: 8b. Warn if contribution card failed
        if: steps.contribution-card.outcome == 'failure'
        run: |
          echo "⚠️ Contribution card generation failed (probabile WORKFLOW_TOKEN scaduto/senza permessi o rate limit GitHub API). Proseguo comunque con l'asset esistente."

      - name: 9. Commit all assets to before-pull
        run: |
          git add assets/
          if ! git diff --staged --quiet; then
            git commit -m "🤖 Auto-update: GitHub Stats & Visualizations"
            git push --force origin before-pull
          else
            echo "No changes to commit"
          fi

      - name: 10. Create PR (before-pull to main)
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          retry_command() {
            local max_attempts=5
            local timeout=30
            local attempt=1
            local exitCode=0
            while (( attempt <= max_attempts )); do
              echo "Attempt $attempt of $max_attempts..." >&2
              if timeout $timeout "$@"; then
                return 0
              else
                exitCode=$?
                if (( attempt < max_attempts )); then
                  echo "Command failed, waiting 10 seconds before retry..." >&2
                  sleep 10
                fi
              fi
              ((attempt++))
            done
            return $exitCode
          }

          echo "Checking for existing PR..."
          EXISTING_PR=$(retry_command gh pr list --base main --head before-pull --json number --jq '.[0].number // empty')

          if [ -z "$EXISTING_PR" ]; then

            git fetch origin before-pull main
            COMMITS_AHEAD=$(git rev-list --count origin/main..origin/before-pull 2>/dev/null || echo "0")

            if [ "$COMMITS_AHEAD" = "0" ]; then
              echo "⚠️ No commits between before-pull and main, skipping PR creation"
              ISSUE_NUMBER="${{ steps.create-issue.outputs.issue_number }}"
              if [ -n "$ISSUE_NUMBER" ]; then
                echo "Closing issue #$ISSUE_NUMBER (no changes detected)..."
                gh issue close "$ISSUE_NUMBER" \
                  --comment "ℹ️ Nessun aggiornamento necessario: le statistiche non sono cambiate rispetto all'ultima esecuzione." \
                  || echo "⚠️ Could not close issue #$ISSUE_NUMBER"
              fi
              echo "pr_number=" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            ISSUE_NUMBER="${{ steps.create-issue.outputs.issue_number }}"
            PR_BODY="Aggiornamento automatico delle statistiche GitHub.

          Closes #${ISSUE_NUMBER}

          Questa PR contiene:
          - 🏆 GitHub trophies
          - 📊 GitHub stats
          - ⌨️ Top languages
          - 🔥 GitHub streak"

            echo "Creating new PR ($COMMITS_AHEAD commits ahead)..."
            retry_command gh pr create \
              --base main \
              --head before-pull \
              --title "🤖 Auto-update: GitHub Stats & Visualizations" \
              --body "$PR_BODY"

            echo "Getting PR number..."
            PR_NUMBER=$(retry_command gh pr list --base main --head before-pull --json number --jq '.[0].number')
            echo "PR created: #$PR_NUMBER"

            echo "Assigning PR to repository owner..."
            retry_command gh pr edit "$PR_NUMBER" --add-assignee "${{ github.repository_owner }}"
          else
            PR_NUMBER=$EXISTING_PR
            echo "Using existing PR #$PR_NUMBER"
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

  review-and-merge-pr:
    needs: generate
    if: needs.generate.outputs.pr_number != ''
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.WORKFLOW_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --local user.email "info@davideladisa.it"
          git config --local user.name "FrancoStino"

      - name: Resolve conflicts and merge PR
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: |
          PR_NUMBER="${{ needs.generate.outputs.pr_number }}"

          PR_STATE=$(gh pr view "$PR_NUMBER" --json state --jq '.state')
          echo "PR #$PR_NUMBER state: $PR_STATE"

          if [ "$PR_STATE" = "MERGED" ]; then
            echo "✅ PR #$PR_NUMBER is already merged, skipping..."
            exit 0
          fi

          if [ "$PR_STATE" = "CLOSED" ]; then
            echo "⚠️ PR #$PR_NUMBER is already closed, skipping..."
            exit 0
          fi

          echo "Approving PR #$PR_NUMBER..."
          gh pr review "$PR_NUMBER" --approve --body "✅ Reviewed and approved automatically" || true

          git fetch origin
          git checkout main
          git pull origin main

          echo "Merging before-pull into main with conflict resolution..."
          if ! git merge origin/before-pull --no-edit -m "Merge PR #$PR_NUMBER: Stats update [skip ci]"; then
            echo "⚠️ Merge conflicts detected, resolving..."
            git checkout --theirs assets/
            git add assets/
            git commit --no-edit -m "Merge PR #$PR_NUMBER: Stats update [skip ci]"
          fi

          MAX_RETRIES=5
          RETRY=0
          until git push origin main; do
            RETRY=$((RETRY + 1))
            if [ "$RETRY" -ge "$MAX_RETRIES" ]; then
              echo "❌ Push failed after $MAX_RETRIES attempts"
              exit 1
            fi
            echo "⚠️ Push rejected, pulling and rebasing ($RETRY/$MAX_RETRIES)..."
            git pull origin main --rebase
          done

          PR_STATE_AFTER=$(gh pr view "$PR_NUMBER" --json state --jq '.state')

          if [ "$PR_STATE_AFTER" = "OPEN" ]; then
            echo "Closing PR #$PR_NUMBER..."
            gh pr close "$PR_NUMBER" --comment "✅ Merged manually with conflict resolution" --delete-branch=false
          else
            echo "✅ PR #$PR_NUMBER already merged/closed"
          fi

          echo "✅ Merge process completed successfully"

      - name: Close issue after successful merge
        if: success()
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: |
          retry_command() {
            local max_attempts=5
            local timeout=30
            local attempt=1
            local exitCode=0
            while (( attempt <= max_attempts )); do
              echo "Attempt $attempt of $max_attempts..." >&2
              if timeout $timeout "$@"; then
                return 0
              else
                exitCode=$?
                if (( attempt < max_attempts )); then
                  echo "Command failed, waiting 10 seconds before retry..." >&2
                  sleep 10
                fi
              fi
              ((attempt++))
            done
            return $exitCode
          }

          ISSUE_NUMBER="${{ needs.generate.outputs.issue_number }}"

          if [ -n "$ISSUE_NUMBER" ]; then
            echo "Closing issue #$ISSUE_NUMBER..."
            retry_command gh issue close "$ISSUE_NUMBER" --comment "✅ Aggiornamento completato con successo! Tutte le statistiche sono state aggiornate e la PR è stata mergiata."
            echo "✅ Issue #$ISSUE_NUMBER closed successfully"
          else
            echo "⚠️ No issue number found to close"
          fi
